apiVersion: v1
kind: ConfigMap
metadata:
  name: threat-intel-config
  namespace: threat-intel
data:
  APP_NAME: "ai-threat-hunting-agent"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://your-frontend-domain.com"
  DASHBOARD_CACHE_TTL_SECONDS: "300"
  FEED_CACHE_TTL_SECONDS: "300"
  FEED_DEFAULT_TIMEOUT_SECONDS: "30"
  FEED_DEFAULT_RETRY_COUNT: "3"
  FEED_CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  FEED_CIRCUIT_BREAKER_RESET_SECONDS: "600"
  GROQ_MODEL: "llama-3.1-70b-versatile"
  GROQ_BASE_URL: "https://api.groq.com/openai/v1"
  GROQ_TIMEOUT_SECONDS: "60"
  GROQ_RETRY_COUNT: "3"
  AI_RATE_LIMIT_PER_MINUTE: "120"
  AI_CONFIDENCE_THRESHOLD: "60"
  AI_VECTOR_COLLECTION_PREFIX: "ai_threat_intel"
  AI_VECTOR_PERSIST_PATH: "./chroma"
